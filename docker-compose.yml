services:
  postgres:
    image: postgres:16-alpine
    container_name: nexone-landing-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nexone_landing
    volumes:
      - nexone_landing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexone -d nexone_landing"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexone-landing-backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexone-landing-nginx
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nexone_landing_pgdata:
