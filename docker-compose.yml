services:
  postgres:
    image: postgres:16-alpine
    container_name: nexone-landing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nexone_landing
    volumes:
      - nexone_landing_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexone -d nexone_landing"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexone-landing-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexone-landing-nginx
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.product-nexone.rule=Host(`product-nexone.nexoratech.co`)"
      - "traefik.http.routers.product-nexone.entrypoints=websecure"
      - "traefik.http.routers.product-nexone.tls.certresolver=myresolver"
      - "traefik.http.services.product-nexone.loadbalancer.server.port=80"

volumes:
  nexone_landing_pgdata:

networks:
  web:
    external: true
    name: web
